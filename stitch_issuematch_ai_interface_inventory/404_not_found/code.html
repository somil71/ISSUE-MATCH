<style>
        .glitch-text {
            position: relative;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111318;
        }
        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #93000a;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #4cd7f6;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(74px, 9999px, 83px, 0); }
            20% { clip: rect(32px, 9999px, 97px, 0); }
            40% { clip: rect(6px, 9999px, 54px, 0); }
            60% { clip: rect(98px, 9999px, 12px, 0); }
            80% { clip: rect(44px, 9999px, 78px, 0); }
            100% { clip: rect(100px, 9999px, 60px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(40px, 9999px, 80px, 0); }
            40% { clip: rect(15px, 9999px, 90px, 0); }
            60% { clip: rect(80px, 9999px, 20px, 0); }
            80% { clip: rect(20px, 9999px, 60px, 0); }
